pre-commit:
  parallel: true
  commands:
    spellcheck:
      glob: "*.{md,txt,yml,yaml}"
      run: typos --config .typos.toml {staged_files}

commit-msg:
  commands:
    conventional-commit:
      run: |
        msg=$(head -1 {1} | tr -d '\r')
        # Skip merge commits
        if echo "$msg" | grep -Eq '^Merge '; then
          exit 0
        fi
        # Release Please / release subjects
        if echo "$msg" | grep -Eq '^[Rr]elease[[:space:]]+[vV]?[0-9]'; then
          exit 0
        fi
        if echo "$msg" | grep -Eq '^(build|chore|ci)(\([a-zA-Z0-9._/-]+\))?(!)?:[[:space:]]+[Rr]elease[[:space:]]'; then
          exit 0
        fi
        pattern="^(feat|fix|docs|style|refactor|perf|test|build|ci|chore|revert)(\(.+\))?(!)?: .+"
        if ! echo "$msg" | grep -Eq "$pattern"; then
          echo "ERROR: Commit message must follow Conventional Commits format"
          echo "  Format: <type>[optional scope]: <description>"
          echo "  Types: feat, fix, docs, style, refactor, perf, test, build, ci, chore, revert"
          echo "  Example: feat: add user authentication"
          echo "  Example: fix(api): resolve timeout issue"
          echo "  Got: $msg"
          exit 1
        fi
    dco-signoff:
      run: |
        if ! grep -q "^Signed-off-by:" {1}; then
          echo "ERROR: Missing DCO sign-off. Use 'git commit -s'"
          exit 1
        fi
