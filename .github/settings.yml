# Repository Settings
#
# Applied by .github/workflows/apply-settings.yml on push to the default branch
# (settings.yml change), weekly schedule, or workflow_dispatch.
#
# GITHUB_TOKEN can manage labels. For repository fields (description, merge settings),
# add a classic PAT with `repo` scope as secret SETTINGS_TOKEN.
#
# Reference: https://docs.github.com/en/rest/repos

repository:
  description: "{{DESCRIPTION}}"
  homepage: "https://github.com/{{OWNER}}/{{REPO_NAME}}"
  topics:
    - "{{REPO_NAME}}"
  visibility: public
  has_issues: true
  has_projects: true
  has_wiki: false
  has_downloads: true
  has_discussions: true
  is_template: false
  default_branch: main
  allow_forking: true
  allow_squash_merge: true
  allow_merge_commit: false
  allow_rebase_merge: false
  delete_branch_on_merge: true
  allow_auto_merge: false
  allow_update_branch: true
  squash_merge_commit_title: PR_TITLE
  squash_merge_commit_message: PR_BODY
  merge_commit_title: MERGE_MESSAGE
  merge_commit_message: PR_TITLE
  web_commit_signoff_required: true

labels:
  blocked:
    color: e11d21
    description: Blocked by another issue or PR
  breaking-change:
    color: b60205
    description: Breaking change requiring major version bump
  bug:
    color: d73a4a
    description: Something isn't working
  component/ci:
    color: c5def5
    description: CI/CD related
  component/docs:
    color: c5def5
    description: Documentation related
  component/src:
    color: c5def5
    description: Source code
  component/tests:
    color: c5def5
    description: Test suite
  component/config:
    color: c5def5
    description: Configuration files
  dependencies:
    color: "0366d6"
    description: Dependencies update
  do-not-merge:
    color: e11d21
    description: PR should not be merged
  documentation:
    color: "0075ca"
    description: Improvements or additions to documentation
  enhancement:
    color: a2eeef
    description: New feature or request
  good first issue:
    color: "7057ff"
    description: Good for newcomers
  help wanted:
    color: "008672"
    description: Extra attention is needed
  mentor-available:
    color: 0e8a16
    description: A mentor is available to help with this issue
  needs-info:
    color: ffffff
    description: Additional information needed
  needs-rebase:
    color: e11d21
    description: PR needs to be rebased
  needs-triage:
    color: ededed
    description: Needs initial triage by maintainers
  proposal:
    color: fbca04
    description: Architectural proposal requiring discussion
  question:
    color: d876e3
    description: Further information is requested
  security:
    color: d93f0b
    description: Security-related issue or fix
  size/L:
    color: A14C05
    description: Large PR (500-1000 lines)
  size/M:
    color: 7F7203
    description: Medium PR (100-500 lines)
  size/S:
    color: 5D9801
    description: Small PR (10-100 lines)
  size/XL:
    color: C32607
    description: Extra large PR (> 1000 lines)
  size/XS:
    color: 3CBF00
    description: Extra small PR (< 10 lines)
  tests:
    color: bfdadc
    description: Test-related changes
  wip:
    color: fef2c0
    description: Work in progress
  chore:
    color: fef2c0
    description: Maintenance task
  perf:
    color: f9d0c4
    description: Performance improvement
  refactor:
    color: d4c5f9
    description: Code refactoring
  build:
    color: c2e0c6
    description: Build system changes

security:
  secret_scanning:
    status: enabled
  secret_scanning_push_protection:
    status: enabled
  dependabot_security_updates:
    status: enabled

code_scanning:
  state: not-configured
  query_suite: default
  # Add your project languages here once code scanning is enabled, e.g.
  #   languages: [actions, javascript, python, go, csharp, ...]
  languages: [actions]
