name: Bug Report
description: Report a bug or unexpected behavior
title: "[Bug]: "
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report!

        **Before submitting**, please search [existing issues](https://github.com/{{OWNER}}/{{REPO_NAME}}/issues) to avoid duplicates.

        For security issues, see [SECURITY.md](https://github.com/{{OWNER}}/{{REPO_NAME}}/blob/main/SECURITY.md) instead of filing a public issue.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug
      placeholder: Describe what happened and what you expected to happen
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior
      placeholder: |
        1. Go to '...'
        2. Run '...'
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened?
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version
      description: Release version (e.g. v1.2.0), or commit hash if built from source
      placeholder: "e.g., v1.2.0"
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: |
        Provide relevant environment information:
        - Operating system and version
        - Runtime / language version
        - How you installed or built the project
      placeholder: |
        - OS: Ubuntu 24.04 / Windows 11 24H2 / macOS 15
        - Runtime: e.g. Node 22 / Go 1.23 / Python 3.12
        - Install method: package manager / built from source

  - type: textarea
    id: logs
    attributes:
      label: Relevant Logs
      description: Please copy and paste any relevant log output or error messages
      render: shell

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Add any other context, screenshots, or information about the problem

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I have searched for similar issues and this is not a duplicate
          required: true
        - label: I have provided all the requested information
          required: true
