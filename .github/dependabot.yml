  #     prefix: "chore"
  #     include: "scope"
  #
  # - package-ecosystem: pip          # Python (requirements.txt / pyproject.toml)
  # - package-ecosystem: gomod        # Go (go.mod)
  # - package-ecosystem: cargo        # Rust (Cargo.toml)
  # - package-ecosystem: nuget        # .NET (*.csproj)
  # - package-ecosystem: gradle       # Java / Kotlin
