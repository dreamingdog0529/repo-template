name: Release Please

on:
  push:
    branches:
      - main

# Least privilege at the workflow level; elevate only for the release job.
permissions:
  contents: read

concurrency:
  group: release-please-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-please:
    name: Open or merge release PR
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - name: Release Please
        id: release
        uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  # OPTIONAL: build and attach release assets when a release is created.
  # Add a reusable workflow (e.g. .github/workflows/release-assets.yml) that
  # builds your artifacts, then wire it up like below. Because releases created
  # with GITHUB_TOKEN do not trigger other workflows, prefer workflow_call over
  # a standalone "release: published" trigger.
