name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Least privilege: build/test only needs to read the repository contents.
permissions:
  contents: read

jobs:
  build-and-test:
    name: Build and test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      # TODO: Set up your language toolchain. Pin any action you add to a full
      # commit SHA with a version comment (see docs/security-hardening.md), e.g.
      #   - uses: actions/setup-node@<sha>     # v4  (Node.js)
      #   - uses: actions/setup-go@<sha>       # v5  (Go)
      #   - uses: actions/setup-python@<sha>   # v5  (Python)
      #   - uses: actions/setup-dotnet@<sha>   # v6  (.NET)
      #   - uses: dtolnay/rust-toolchain@<sha> # stable  (Rust)

      # The initializer (scripts/init-template.ps1) fills in the build/test
      # commands. Until then these steps no-op so the template's own CI stays
      # green; after initialization they run your real commands.
      - name: Build
        shell: bash
        run: |
          cmd='{{BUILD_COMMAND}}'
          case "$cmd" in
            *"{{"*) echo "No build command configured yet — run scripts/init-template.ps1. Skipping." ;;
            *) eval "$cmd" ;;
          esac

      - name: Test
        shell: bash
        run: |
          cmd='{{TEST_COMMAND}}'
          case "$cmd" in
            *"{{"*) echo "No test command configured yet — run scripts/init-template.ps1. Skipping." ;;
            *) eval "$cmd" ;;
          esac
