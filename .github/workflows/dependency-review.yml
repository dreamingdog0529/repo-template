name: Dependency Review

on:
  pull_request:
    branches: [main, master]

# Requires Dependency graph (Settings → Code security).
# Public repos: enable Dependency graph if this job 404s with GITHUB_TOKEN.
permissions:
  contents: read
  pull-requests: write

jobs:
  dependency-review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Dependency Review
        uses: actions/dependency-review-action@v5
        with:
          fail-on-severity: high
          deny-licenses: GPL-3.0, AGPL-3.0
          comment-summary-in-pr: always
